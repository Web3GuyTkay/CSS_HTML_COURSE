<style>
    .subscribe-button {
        background-color: rgb(204, 0, 0);
        color: rgb(255, 255, 255);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: opacity 0.15s;

    }

    .subscribe-button:hover{
        opacity: 0.8;
    }

    .subscribe-button:active{
        opacity: 0.3;
    }


    .join-button {
        background-color: white;
        color: rgb(30, 110, 230);
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 2px;
        border-color: rgb(30, 110, 230);
        border-style: solid;
        border-width: 1;
        border-radius: 2px;
        cursor: pointer;
        margin-right: 8px;
        transition: color 0.15s, background_color 0.15s;
    }     
    
    .join-button:hover{
        color: white;
        background-color: rgb(30, 110, 230);
    }

    .join-button:active{
        color: white;
        background-color: rgb(30, 110, 230);
        opacity: 0.8;
    }
    
    .tweet-button {
        background-color: rgb(29, 155, 240);
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 16px;
        padding-right: 16px;
        border-radius: 2px;
        border-radius: 20px;
        border: none;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        margin-right: 8px;
        transition: box-shadow 0.15;
    }

    .tweet-button:hover{
        box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.15)
    }
</style>

<button class="subscribe-button">
    SUBSCRIBE
</button>

<button class="join-button"> 
    JOIN
</button>

<button class="tweet-button">
    Tweet
</button>
